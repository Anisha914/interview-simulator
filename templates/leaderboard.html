<meta charset="UTF-8">

<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="style.css">
</head>
<body>



<h2 style="text-align:center;">&#127942; Leaderboard</h2>



<table id="leaderboardTable">
    <thead>
    <tr>
        <th>Rank</th>
        <th>User</th>
        <th>Score</th>
    </tr>
    </thead>
    <tbody>

    </tbody>
</table>

<script>
    fetch("http://localhost:8080/leaderboard")
    .then(res => res.json())
    .then(data => {

        let tbody = document.querySelector("#leaderboardTable tbody");
        tbody.innerHTML = "";

        data.forEach((user, index) => {
            let row = `
                <tr>
                    <td>${index + 1}</td>
                    <td>${user.username}</td>
                    <td>${user.score}</td>
                </tr>
            `;
            tbody.innerHTML += row;
        });

        console.log("Leaderboard:", data); // debug
    })
    .catch(err => console.error(err));
</script>


</body>
</html>
